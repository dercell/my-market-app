version: '3.8'
services:
  db:
    image: mysql:oraclelinux9
    container_name: market-db
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: yes
      MYSQL_DATABASE: my_market_db
      MYSQL_USER: yp_user
      MYSQL_PASSWORD: yp_password
    ports:
      - "3306:3306"
  redis:
    image: redis:8.2.7-bookworm
    container_name: market-redis
    ports:
      - "6379:6379"
  market-app:
    container_name: market-app
    depends_on:
      - db
      - redis
    build:
      context: .
      dockerfile: ./market-app/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./market-app/.env
  payment-service:
    container_name: payment-service-app
    env_file:
      - ./payment-service/.env
    build:
      context: .
      dockerfile: ./payment-service/Dockerfile
    ports:
      - "8090:8090"