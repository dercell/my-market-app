<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="utf-8">
    <title>Витрина магазина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">
    <div class="container p-2">
        <div class="row p-2">
            <div class="col">
                <div class="hstack gap-3">
                    <h2>
                        <span class="badge text-bg-success">Витрина магазина</span>
                    </h2>
                    <div class="d-flex ms-auto" sec:authorize="isAuthenticated()">
                        <div class="dropdown">
                            <button class="btn btn-secondary dropdown-toggle"
                                    type="button"
                                    data-bs-toggle="dropdown"
                                    aria-expanded="false">
                                Меню
                            </button>
                            <ul class="dropdown-menu">
                                <li class="dropdown-item"><span sec:authentication="name">Пользователь</span></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a href="/cart/items" class="dropdown-item btn btn-secondary bi bi-cart4"> Корзина</a>
                                </li>
                                <li><a href="/items" class="dropdown-item btn btn-secondary bi bi-arrow-left-square"> Главная</a>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item btn btn-secondary bi bi-box-arrow-in-left" th:href="@{/logout}">
                                    Выйти</a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row p-2" th:each="order : ${orders}">
            <div class="col">
                <div class="card">
                    <div class="card-header">
                        <a th:text="${'Заказ №'+order.id()}" th:href="${'/orders/'+order.id()}"></a>
                    </div>
                    <ul class="list-group list-group-flush" th:each="item : ${order.items()}">
                        <li class="list-group-item" th:text="${item.getTitle()+' ('+item.getCount()+' шт.) '+(item.getPrice()*item.getCount())+' руб.'}"/>
                    </ul>
                    <div class="card-footer">
                        <b th:text="${'Сумма: '+order.totalSum()}+' руб.'"></b>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
</body>

</html>
