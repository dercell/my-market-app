<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title th:text="${error} + ' | Ошибка'">Ошибка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="text-center mb-5">
                <h1 class="display-3 fw-bold text-danger" th:text="${error}">Ошибка</h1>
            </div>

            <!-- Основная ошибка -->
            <div class="card border-0 shadow">
                <div class="card-body">
                    <h4 class="card-title text-danger">
                        <i class="bi bi-exclamation-triangle"></i>
                        <span th:text="${message}">Сообщение ошибки</span>
                    </h4>


                    <div th:if="${rootCause}" class="error-details p-3 mt-3 rounded">
                        <h6 class="text-warning mb-2">Root Cause:</h6>
                        <pre class="mb-0 small" th:text="${rootCause}">Причина</pre>
                    </div>


                    <small class="text-muted mt-3 d-block">
                        <span th:text="${#temporals.format(timestamp, 'yyyy-MM-dd HH:mm:ss')}">2026-05-11 17:17</span>
                    </small>
                </div>
            </div>

            <!-- Кнопки -->
            <div class="text-center mt-5">
                <a href="/items" class="btn btn-secondary bi bi-arrow-left-square">Главная</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
</body>

</html>
